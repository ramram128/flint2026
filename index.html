<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FLINT 2026 | Registrations Closed</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg,#4b2c91,#1a2a6c,#2c3e50);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-align:center;
    }

    .container{
      background: rgba(255,255,255,0.08);
      padding:50px;
      border-radius:12px;
      backdrop-filter: blur(10px);
      max-width:500px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);

    h1{
      font-size:36px;
      margin-bottom:10px;
      letter-spacing:2px;
    }

    h2{
      font-size:24px;
      margin-bottom:20px;
      color:#ffd700;
    }

    p{
      font-size:16px;
      line-height:1.6;
      color:#e0e0e0;
    }

    .footer{
      margin-top:25px;
      font-size:14px;
      opacity:0.8;

<body>

  <div class="container">
    <h1>FLINT 2026</h1>
    <h2>Registrations Closed</h2>

    <p>
      Thank you for your interest in the FLINT 2026 technical event.

    </p>

    <p>

    <div class="footer">

    </div>
